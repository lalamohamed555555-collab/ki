<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cables - King Brand</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

/* الهيدر */
header{
    background:linear-gradient(45deg,#22c55e,#16a34a);
    padding:20px;
    text-align:center;
    font-size:24px;
}

/* زر الرجوع */
.back{
    display:block;
    margin:15px;
    color:#22c55e;
    text-decoration:none;
    font-weight:bold;
}

/* المنتجات */
.products{
    display:flex;
    flex-direction:column;
    gap:20px;
    padding:20px;
}

/* الكارت */
.card{
    display:flex;
    gap:15px;
    background:#1e293b;
    padding:15px;
    border-radius:15px;
    align-items:center;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 20px rgba(34,197,94,0.3);
}

/* الصورة */
.card img{
    width:110px;
    height:110px;
    object-fit:contain;
    background:#0f172a;
    padding:8px;
    border-radius:10px;
}

/* النص */
.info{
    flex:1;
}

.price{
    color:#22c55e;
    font-weight:bold;
    font-size:18px;
}

/* زر */
.btn{
    display:inline-block;
    margin-top:10px;
    background:linear-gradient(45deg,#22c55e,#16a34a);
    color:white;
    padding:10px 18px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.1);
    box-shadow:0 0 15px #22c55e;
}
</style>
</head>

<body>

<header>🔌 Cables</header>

<a class="back" href="index.html">⬅ رجوع للرئيسية</a>

<div class="products">
<!-- هنا هتحط منتجات الكابلات -->
<div class="card">
<img src="jcally-jm7-amplifier.jpg.jpeg">
<div class="info">
<h3>Jcally JM7 Amplifier</h3>
<p class="price">1400 جنيه</p>
<a class="btn" href="https://wa.me/201035119581?text=عايز اطلب Jcally JM7 Amplifier">اطلب الآن</a>
</div>
</div> 

<div class="card">
<img src="jcally-jm20-max.jpg.jpeg">
<div class="info">
<h3>Jcally JM20 MAX</h3>
<p class="price">2200 جنيه</p>
<a class="btn" href="https://wa.me/201035119581?text=عايز اطلب Jcally JM20 MAX">اطلب الآن</a>
</div>
</div>

<div class="card">
<img src="veggieg-usb-c-to-audio-jack-converter.jpg.jpeg">
<div class="info">
<h3>VegGieg USB-C to Audio Jack Converter</h3>
<p class="price">500 جنيه</p>
<a class="btn" href="https://wa.me/201035119581?text=عايز اطلب VegGieg USB-C to Audio Jack Converter">اطلب الآن</a>
</div>
</div>
    
</div>

</body>
</html>
