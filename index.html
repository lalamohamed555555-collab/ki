<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>King Brand Store</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}

/* الهيدر */
header{
    background:linear-gradient(45deg,#22c55e,#16a34a);
    padding:20px;
    font-size:26px;
    font-weight:bold;
}

/* البحث */
.search input{
    padding:12px;
    width:260px;
    margin:15px;
    border-radius:10px;
    border:none;
    outline:none;
}

/* المنتجات */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

/* الكارت */
.card{
    background:#1e293b;
    padding:15px;
    border-radius:15px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 10px 25px rgba(34,197,94,0.3);
}

/* الصور */
.card img{
    width:100%;
    height:160px;
    object-fit:cover;
    border-radius:10px;
}

/* السعر */
.price{
    color:#22c55e;
    font-weight:bold;
    font-size:18px;
}

/* زرار */
.btn{
    display:inline-block;
    background:#22c55e;
    color:white;
    padding:10px 15px;
    margin-top:10px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.1);
    box-shadow:0 0 10px #22c55e;
}

/* الفوتر */
.footer{
    margin:30px;
}
</style>
</head>

<body>

<header>🛒 King Brand Store</header>

<!-- 🔍 البحث -->
<div class="search">
<input type="text" id="search" placeholder="ابحث عن منتج..." onkeyup="searchProduct()">
</div>

<!-- 🛒 المنتجات -->
<div class="products">

<!-- منتج -->
<div class="card">
<img src="gk-kunten-iem.jpg.jpeg">
<h3>Gk Kunten type C Iem</h3>
<p class="price">2400 جنيه</p>
<a class="btn" href="https://wa.me/201035119581?text=عايز اطلب Gk Kunten type C Iem" target="_blank">
اطلب الآن
</a>

</div>

<!-- منتج -->
<div class="card">
<img src="ajazz-ak820-max-ultra.jpg.jpeg">
<h3>كيبورد AJAZZ AK820 MAX ULTRA</h3>
<p class="price">5500 جنيه</p>
<a class="btn" href="https://wa.me/201035119581?text=عايز اطلب كيبورد AJAZZ AK820 MAX ULTRA" target="_blank">
اطلب الآن
</a>
</div>

<!-- منتج -->
<div class="card">
<img src="attack-shark-x6.jpg.jpeg" alt="ATTACK SHARK X6">
<h3>ATTACK SHARK X6</h3>
<p class="price">2800 جنيه</p>
<a class="btn" href="https://wa.me/201035119581?text=عايز اطلب ATTACK SHARK X6" target="_blank">
اطلب الآن
</a>

</div>

<!-- منتج -->
<div class="card">
<img src="ajazz-ahm10-max.jpg.jpeg">
<h3>سماعة AJAZZ AHM10 MAX</h3>
<p class="price">3700 جنيه</p>
<a class="btn" href="https://wa.me/201035119581?text=عايز اطلب سماعة AJAZZ AHM10 MAX" target="_blank">
اطلب الآن
</a>
</div>

<!-- المنتج اللي ضفناه -->
<div class="card">
<img src="Ajazz AK820 pro wireless.jpg.jpeg">
<h3>Ajazz AK820 Pro Wireless</h3>
<p class="price">3700 جنيه</p>
<a class="btn" href="https://wa.me/201035119581?text=عايز اطلب Ajazz AK820 Pro Wireless" target="_blank">
اطلب الآن
</a>
</div>

</div>

<!-- 🔍 البحث -->
<script>
function searchProduct(){
    let val = document.getElementById("search").value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card=>{
        card.style.display = card.innerText.toLowerCase().includes(val) ? "block" : "none";
    });
}
</script>

<!-- 🔗 السوشيال -->
<div class="footer">

<button onclick="window.open('https://www.facebook.com/share/1Coy162Axc/', '_blank')" 
style="background:#1877F2;color:white;padding:15px 25px;font-size:18px;border:none;border-radius:10px;cursor:pointer;margin:10px;font-weight:bold;">
تابعنا على فيسبوك
</button>

<button onclick="window.open('https://www.tiktok.com/@king.brand.store4', '_blank')" 
style="background:#000;color:white;padding:15px 25px;font-size:18px;border:none;border-radius:10px;cursor:pointer;margin:10px;font-weight:bold;">
تابعنا على تيك توك
</button>

</div>

</body>
</html>
