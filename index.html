<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">

<title>King Brand Store</title>

<style>
body {

    font-family: Arial;
    background: #0f172a;
    color: white;
    margin: 0;
    text-align: center;
}

header {
    background: #22c55e;
    padding: 20px;
    font-size: 28px;
}

.search {
    margin: 20px;
}

input {
    padding: 10px;
    width: 250px;
}

.categories button {
    margin: 5px;
    padding: 10px;
    background: #22c55e;
    border: none;
    cursor: pointer;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 12px;
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 10px;
}

.price {
    color: #22c55e;
    font-weight: bold;
}

button {
    margin-top: 10px;
    padding: 8px;
    background: #22c55e;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<header>🛒 King Brand Store</header>

<!-- 🔍 البحث -->
<div class="search">
    <input type="text" id="search" placeholder="ابحث عن منتج..." onkeyup="searchProduct()">
</div>

<!-- 🧩 التصنيفات -->
<div class="categories">
    <button onclick="filter('all')">الكل</button>
    <button onclick="filter('keyboard')">كيبورد</button>
    <button onclick="filter('mouse')">ماوس</button>
    <button onclick="filter('headset')">سماعات</button>
</div>

<!-- 🛒 المنتجات -->
<div class="products" id="products">

</div>

      اطلب الآن
    </button>
  </a>
</div>
</div>
   <div class="product">

    <button style="background:green;color:white;padding:10px 20px;border:none;border-radius:8px;">
      اطلب الآن
    </button>
  </a>
</div>
    <div class="product">
  <img src="ajazz-ahm10-max.jpg.jpeg" alt="AJAZZ AHM10 MAX Headset" style="width:200px;">
  <h2>سماعة AJAZZ AHM10 MAX</h2> 
  <p style="color:green;">السعر: 3700 جنيه</p>
  <a href="https://wa.me/201035119581?text=عايز اطلب سماعة AJAZZ AHM10 MAX" target="_blank">
    <button style="background:green;color:white;padding:10px 20px;border:none;border-radius:8px;">
      اطلب الآن
    </button>
  </a>
</div>

</div>

<script>

// 📲 واتساب
function buy(product){
    let phone = "201035119581"; // حط رقمك (بدون 0)
    let msg = "عايز أطلب: " + product;
    let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(msg);
    window.open(url, "_blank");
}

// 🔍 البحث
function searchProduct(){
    let input = document.getElementById("search").value.toLowerCase();
    let cards = document.getElementsByClassName("card");

    for(let i=0;i<cards.length;i++){
        let title = cards[i].innerText.toLowerCase();
        cards[i].style.display = title.includes(input) ? "block" : "none";
    }
}

// 🧩 الفلترة
function filter(category){
    let cards = document.getElementsByClassName("card");

    for(let i=0;i<cards.length;i++){
        let cat = cards[i].getAttribute("data-category");
        if(category == "all" || cat == category){
            cards[i].style.display = "block";
        } else {
            cards[i].style.display = "none";
        }
    }
}

</script>
