<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>King Brand Store Pro</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
    overflow-x:hidden;
}

/* الهيدر */
header{
    background:#22c55e;
    padding:18px;
    font-size:26px;
    font-weight:bold;
    animation: slideDown 0.8s ease;
}

/* البحث */
.search input{
    padding:12px;
    width:260px;
    margin:15px;
    border-radius:10px;
    border:none;
    outline:none;
    transition:0.3s;
}

.search input:focus{
    transform:scale(1.05);
}

/* المنتجات */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:18px;
    padding:20px;
}

/* كرت المنتج */
.card{
    background:#1e293b;
    padding:12px;
    border-radius:14px;
    cursor:pointer;

    opacity:0;
    transform:translateY(30px);
    animation: fadeUp 0.6s forwards;
}

.card:hover{
    transform:translateY(-10px) scale(1.03);
    transition:0.3s;
    box-shadow:0 10px 25px rgba(34,197,94,0.3);
}

/* الصور */
.card img{
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:10px;
}

/* السعر */
.price{
    color:#22c55e;
    font-weight:bold;
}

/* الأزرار */
button{
    background:#22c55e;
    border:none;
    padding:10px;
    margin-top:8px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
    box-shadow:0 0 10px #22c55e;
}

/* السلة */
.cart{
    position:fixed;
    top:10px;
    right:10px;
    background:#1e293b;
    padding:10px;
    border-radius:12px;
    width:200px;
    animation: slideRight 0.8s ease;
}

/* أنيميشن */
@keyframes fadeUp{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes slideDown{
    from{transform:translateY(-100%);}
    to{transform:translateY(0);}
}

@keyframes slideRight{
    from{transform:translateX(120%);}
    to{transform:translateX(0);}
}
</style>
</head>

<body>

<header>🛒 King Brand Store</header>

<!-- البحث -->
<div class="search">
<input type="text" id="search" placeholder="ابحث عن منتج..." onkeyup="searchProduct()">
</div>

<!-- السلة -->
<div class="cart">
<h3>🛒 السلة</h3>
<div id="cartItems"></div>
<p>الإجمالي: <span id="total">0</span> جنيه</p>
<button onclick="checkout()">اطلب واتساب</button>
</div>

<!-- المنتجات -->
<div class="products" id="products">

<div class="card" style="animation-delay:0.1s" onclick="openProduct('كيبورد عادي','1000','gaming-keyboard.jpg.jpeg')">
<img src="gaming-keyboard.jpg.jpeg">
<h3>كيبورد عادي</h3>
<p class="price">1000 جنيه</p>
<button onclick="addToCart('كيبورد عادي',1000,event)">إضافة للسلة</button>
</div>

<div class="card" style="animation-delay:0.2s" onclick="openProduct('AJAZZ AK820','5500','ajazz-ak820-max-ultra.jpg.jpeg')">
<img src="ajazz-ak820-max-ultra.jpg.jpeg">
<h3>كيبورد AJAZZ AK820</h3>
<p class="price">5500 جنيه</p>
<button onclick="addToCart('AJAZZ AK820',5500,event)">إضافة للسلة</button>
</div>

<div class="card" style="animation-delay:0.3s" onclick="openProduct('ماوس RGB','1500','mouse.jpg.jpeg')">
<img src="mouse.jpg.jpeg">
<h3>ماوس Gaming RGB</h3>
<p class="price">1500 جنيه</p>
<button onclick="addToCart('ماوس RGB',1500,event)">إضافة للسلة</button>
</div>

<div class="card" style="animation-delay:0.4s" onclick="openProduct('سماعة AJAZZ','3700','ajazz-ahm10-max.jpg.jpeg')">
<img src="ajazz-ahm10-max.jpg.jpeg">
<h3>سماعة AJAZZ AHM10 MAX</h3>
<p class="price">3700 جنيه</p>
<button onclick="addToCart('سماعة AJAZZ',3700,event)">إضافة للسلة</button>
</div>

</div>

<script>

let cart = [];

// فتح صفحة المنتج
function openProduct(name, price, img){
    let url = `product.html?name=${encodeURIComponent(name)}&price=${price}&img=${encodeURIComponent(img)}`;
    window.open(url, "_blank");
}

// إضافة للسلة
function addToCart(name, price, event){
    event.stopPropagation();
    cart.push({name, price});
    updateCart();
}

// تحديث السلة
function updateCart(){
    let box = document.getElementById("cartItems");
    let total = 0;

    box.innerHTML = "";

    cart.forEach((item,i)=>{
        total += item.price;

        box.innerHTML += `
        <div>${item.name} - ${item.price}
        <button onclick="removeItem(${i})">X</button>
        </div>`;
    });

    document.getElementById("total").innerText = total;
}

// حذف
function removeItem(i){
    cart.splice(i,1);
    updateCart();
}

// شراء
function checkout(){
    let phone="201035119581";
    let msg="عايز أطلب:\n";

    cart.forEach(i=>{
        msg += "- " + i.name + " " + i.price + "\n";
    });

    window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg));
}

// بحث
function searchProduct(){
    let val=document.getElementById("search").value.toLowerCase();
    let cards=document.querySelectorAll(".card");

    cards.forEach(c=>{
        c.style.display=c.innerText.toLowerCase().includes(val)?"block":"none";
    });
}

</script>

</body>
</html>
