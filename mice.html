<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mice - King Brand</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

/* الهيدر */
header{
    background:linear-gradient(45deg,#22c55e,#16a34a);
    padding:20px;
    text-align:center;
    font-size:24px;
}

/* زر الرجوع */
.back{
    display:block;
    margin:15px;
    color:#22c55e;
    text-decoration:none;
    font-weight:bold;
}

/* المنتجات */
.products{
    display:flex;
    flex-direction:column;
    gap:20px;
    padding:20px;
}

/* الكارت */
.card{
    display:flex;
    gap:15px;
    background:#1e293b;
    padding:15px;
    border-radius:15px;
    align-items:center;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 20px rgba(34,197,94,0.3);
}

/* الصورة */
.card img{
    width:110px;
    height:110px;
    object-fit:contain;
    background:#0f172a;
    padding:8px;
    border-radius:10px;
}

/* النص */
.info{
    flex:1;
}

.price{
    color:#22c55e;
    font-weight:bold;
    font-size:18px;
}

/* زر */
.btn{
    display:inline-block;
    margin-top:10px;
    background:linear-gradient(45deg,#22c55e,#16a34a);
    color:white;
    padding:10px 18px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.1);
    box-shadow:0 0 15px #22c55e;
}
</style>
</head>

<body>

<header>🖱️ Mice</header>

<a class="back" href="index.html">⬅ رجوع للرئيسية</a>

<div class="products">

<!-- منتج -->

<a class="btn" href="https://wa.me/201035119581?text=عايز اطلب ATTACK SHARK X6" target="_blank">
اطلب الآن
</a>
</div>
</div>

<!-- منتج -->

اطلب الآن

</div>
</div>

<!-- منتج -->

</div>
